# -----------------------------------------------------------------------------
# 5. MAJOR RECURRING CONFERENCES
# -----------------------------------------------------------------------------
conferences:

  - name: "SEMICON West"
    url: "https://www.semi.org/en/connect/events/semicon-west"
    method: web_scrape
    notes: "October. Moscone Center, SF. Largest semiconductor event in the West."

  - name: "TechCrunch Disrupt"
    url: "https://techcrunch.com/events/disrupt/"
    method: web_scrape
    notes: "October. Moscone Center. Deep tech and startup track."

  - name: "Hard Tech Week SF"
    url: "https://www.hardtechweek.com/"
    method: web_scrape
    notes: "May/June. Deep tech community events across SF."

  - name: "Deep Tech Week SF"
    url: "https://www.deep-tech-week.com/sf-2026"
    method: web_scrape
    notes: "June. Quantum, semiconductors, clean energy, advanced manufacturing."

  - name: "SF Climate Week"
    url: "https://www.sfclimateweek.org/"
    method: web_scrape
    notes: "April. Clean energy and climate tech events."

  - name: "SF Tech Week"
    url: "https://sftechweek.com/"
    method: web_scrape
    notes: "October. Distributed tech event series."

  - name: "BERC Energy Summit"
    url: "https://berc.berkeley.edu/energy-summit"
    method: web_scrape
    notes: "Annual. Largest student-run energy conference on West Coast."

  - name: "Intersolar North America (San Diego — regional)"
    url: "https://www.intersolar.us/"
    method: web_scrape
    notes: "February. San Diego. Worth tracking for Bay Area attendees."

  - name: "RE+ (formerly Solar Power International)"
    url: "https://www.re-plus.com/"
    method: web_scrape
    notes: "Largest clean energy event in North America. Location rotates."

