# =============================================================================
# San Francisco / Bay Area Event Tracking - Source Configuration
# =============================================================================
# Focus: Power generation, energy storage, power electronics, semiconductors,
#         advanced manufacturing, deep tech infrastructure
# =============================================================================

# -----------------------------------------------------------------------------
# 1. UNIVERSITY EVENT CALENDARS
# -----------------------------------------------------------------------------
university_events:

  # --- Stanford ---
  - name: "Stanford Precourt Institute for Energy Events"
    url: "https://energy.stanford.edu/events"
    method: web_scrape
    notes: "Primary energy events at Stanford."

  - name: "Stanford Energy Seminar Series"
    url: "https://energy.stanford.edu/events/energy-seminar"
    method: web_scrape
    notes: "Weekly seminar. Often features breakthrough research."

  - name: "Stanford EE Events"
    url: "https://ee.stanford.edu/events"
    method: web_scrape

  - name: "Stanford MSE Events"
    url: "https://mse.stanford.edu/events"
    method: web_scrape

  # --- UC Berkeley ---
  - name: "Berkeley Energy & Resources Group Events"
    url: "https://erg.berkeley.edu/events/"
    method: web_scrape

  - name: "BERC (Berkeley Energy and Resources Collaborative) Events"
    url: "https://berc.berkeley.edu/events"
    method: web_scrape
    notes: "Student-run. Annual Energy Summit is flagship event."

  - name: "Berkeley EECS Events"
    url: "https://eecs.berkeley.edu/events"
    method: web_scrape

  - name: "Berkeley MSE Events"
    url: "https://mse.berkeley.edu/events"
    method: web_scrape

  - name: "Haas Energy Institute Events"
    url: "https://haas.berkeley.edu/energy-institute/events/"
    method: web_scrape

  # --- National Labs ---
  - name: "LBNL Public Events"
    url: "https://www.lbl.gov/events/"
    method: web_scrape
    notes: "Lawrence Berkeley National Lab. Materials, energy, computing."

  - name: "SLAC Public Events"
    url: "https://www6.slac.stanford.edu/news-and-events"
    method: web_scrape

  # --- Other ---
  - name: "Santa Clara University Engineering Events"
    url: "https://www.scu.edu/engineering/events/"
    method: web_scrape

# -----------------------------------------------------------------------------
# 2. INCUBATORS / ACCELERATORS
# -----------------------------------------------------------------------------
incubators:

  - name: "Activate (Cyclotron Road) Events"
    url: "https://activate.org/events"
    method: web_scrape
    notes: "Lab-embedded hard tech fellowship. Berkeley site."

  - name: "Greentown Labs Events"
    url: "https://greentownlabs.com/events/"
    luma_url: "https://luma.com/greentownlabs"
    method: web_scrape
    notes: "Also posts events on Luma."

  - name: "Plug and Play Events"
    url: "https://www.plugandplaytechcenter.com/events/"
    eventbrite_url: "https://www.eventbrite.com/o/plug-and-play-tech-center-7588498923"
    method: web_scrape
    notes: "Sunnyvale. Also on Eventbrite and Meetup."

  - name: "HAX Events"
    url: "https://hax.co/"
    method: web_scrape
    notes: "Pre-seed hard tech accelerator. Check for demo days."

  - name: "IndieBio / SOSV Events"
    url: "https://www.sosv.com/events"
    method: web_scrape
    notes: "Deep tech bio + hardware accelerator in SF."

  - name: "Y Combinator Demo Day"
    url: "https://www.ycombinator.com/demoday"
    method: web_scrape
    notes: "Quarterly. Track for hard tech / energy / hardware companies."

# -----------------------------------------------------------------------------
# 3. INDUSTRY / TRADE ORGANIZATIONS
# -----------------------------------------------------------------------------
industry_orgs:

  - name: "SEMI Events Calendar"
    url: "https://www.semi.org/en/connect/events/calendar"
    method: web_scrape
    notes: "SEMI HQ in Milpitas. RSS endpoint sits behind Cloudflare (403) — scrape may also be blocked but the agent handles it gracefully."

  - name: "California Energy Commission Events"
    url: "https://www.energy.ca.gov/events"
    method: web_scrape
    notes: "CEC workshops, hearings, public meetings."

  - name: "CEC Funding Workshops"
    url: "https://www.energy.ca.gov/funding-opportunities"
    method: web_scrape

  - name: "CPUC Public Workshops"
    url: "https://www.cpuc.ca.gov/events"
    method: web_scrape
    notes: "California Public Utilities Commission."

  - name: "CESA (California Energy Storage Alliance) Events"
    url: "https://storagealliance.org/events/"
    method: web_scrape

  - name: "Bay Area Energy Events"
    url: "https://bayareaenergyevents.com/"
    method: web_scrape
    notes: "Aggregator for Bay Area energy industry events."

  - name: "Bay Area Council Events"
    url: "https://www.bayareacouncil.org/events/"
    method: web_scrape
    notes: "Business-civic organization. Energy/infrastructure events."

