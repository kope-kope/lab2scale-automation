# -----------------------------------------------------------------------------
# 3. ACADEMIC PUBLICATIONS
# -----------------------------------------------------------------------------
publications:

  - name: "Nature Materials"
    url: "https://www.nature.com/nmat/"
    rss_url: "https://www.nature.com/nmat.rss"
    method: rss
    notes: "Official RSS. Also available: http://feeds.nature.com/nmat/rss/current"

  - name: "Nature Materials - Web Feeds Hub"
    url: "https://www.nature.com/nmat/web-feeds"
    method: rss
    notes: "Lists all available RSS/Atom feeds for the journal."

  - name: "Advanced Materials (Wiley)"
    url: "https://advanced.onlinelibrary.wiley.com/journal/15214095"
    rss_url: "https://advanced.onlinelibrary.wiley.com/feed/15214095/most-recent"
    method: rss
    notes: "Wiley RSS pattern. Check journal page for exact feed link."

  - name: "Science Robotics"
    url: "https://www.science.org/journal/scirobotics"
    rss_url: "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=scirobotics"
    method: rss
    notes: "AAAS TOC RSS feed pattern."

  - name: "Additive Manufacturing (Elsevier/ScienceDirect)"
    url: "https://www.sciencedirect.com/journal/additive-manufacturing"
    method: web_scrape
    notes: "Elsevier supports RSS via ScienceDirect but URL must be found on journal page."


# -----------------------------------------------------------------------------
# 4. arXiv CATEGORIES
# -----------------------------------------------------------------------------
arxiv:

  - name: "arXiv - Materials Science (cond-mat.mtrl-sci)"
    url: "https://arxiv.org/list/cond-mat.mtrl-sci/recent"
    rss_url: "https://rss.arxiv.org/rss/cond-mat.mtrl-sci"
    method: rss
    notes: "Structures, synthesis, characterization, mechanical properties, defects."

  - name: "arXiv - Mesoscale & Nanoscale Physics (cond-mat.mes-hall)"
    url: "https://arxiv.org/list/cond-mat.mes-hall/recent"
    rss_url: "https://rss.arxiv.org/rss/cond-mat.mes-hall"
    method: rss
    notes: "Covers nanotechnology, nanostructures, quantum dots."

  - name: "arXiv - Quantum Physics (quant-ph)"
    url: "https://arxiv.org/list/quant-ph/recent"
    rss_url: "https://rss.arxiv.org/rss/quant-ph"
    method: rss
    notes: "Quantum computing hardware, algorithms, error correction."

  - name: "arXiv - Applied Physics (physics.app-ph)"
    url: "https://arxiv.org/list/physics.app-ph/recent"
    rss_url: "https://rss.arxiv.org/rss/physics.app-ph"
    method: rss
    notes: "Applied physics including device fabrication."

  - name: "arXiv - Robotics (cs.RO)"
    url: "https://arxiv.org/list/cs.RO/recent"
    rss_url: "https://rss.arxiv.org/rss/cs.RO"
    method: rss
    notes: "Robotics research including manufacturing applications."

  - name: "arXiv - Systems and Control (eess.SY)"
    url: "https://arxiv.org/list/eess.SY/recent"
    rss_url: "https://rss.arxiv.org/rss/eess.SY"
    method: rss
    notes: "Control systems relevant to manufacturing automation."

  - name: "arXiv - Combined Deep Tech Feed"
    rss_url: "https://rss.arxiv.org/rss/cond-mat.mtrl-sci+quant-ph+physics.app-ph+cs.RO"
    method: rss
    notes: "Combined feed. Max 2000 results. Use + to join categories."


