# -----------------------------------------------------------------------------
# 1. ACADEMIC LABS
# -----------------------------------------------------------------------------
academic_labs:

  - name: "MIT LEES - Laboratory for Electromagnetic and Electronic Systems"
    url: "https://lees-rle.mit.edu/"
    method: web_scrape
    notes: "Part of MIT RLE. Power electronics, control, electromagnetics."

  - name: "Virginia Tech CPES - Center for Power Electronics Systems"
    url: "https://cpes.vt.edu/"
    method: web_scrape
    notes: "NSF ERC. One of the top power electronics research centers globally."

  - name: "University of Tennessee CURENT"
    url: "https://curent.utk.edu/"
    method: web_scrape
    news_url: "https://curent.utk.edu/news/press-releases/"
    notes: "Center for Ultra-wide-area Resilient Electric Energy Transmission Networks."

  - name: "Georgia Tech - Electric Machines Lab (GEM)"
    url: "https://gem.ece.gatech.edu/"
    method: web_scrape
    notes: "Electric machines and power electronics research."

  - name: "Georgia Tech - ACES Laboratory"
    url: "https://aces.ece.gatech.edu/"
    method: web_scrape
    notes: "Grid-scale power electronics research."

  - name: "ETH Zurich - Power Electronic Systems Laboratory (PES)"
    url: "https://pes.ee.ethz.ch/"
    method: web_scrape
    research_url: "https://pes.ee.ethz.ch/research.html"
    notes: "Johann W. Kolar's lab. World-leading in high-performance converter design."

  - name: "ETH Zurich - High Power Electronic Systems (HPE)"
    url: "https://hpe.ee.ethz.ch/"
    method: web_scrape
    notes: "High-power converter systems research."

  - name: "Stanford - SUPER Lab (Stanford University Power Electronics Research)"
    url: "https://superlab.stanford.edu/"
    method: web_scrape
    notes: "Juan Rivas-Davila. High-frequency power electronics."

  - name: "Stanford - Wide-Bandgap Lab"
    url: "https://wbglab.stanford.edu/"
    method: web_scrape
    notes: "WBG semiconductor device research."

  - name: "UIUC - Power and Energy Systems Group"
    url: "https://energy.ece.illinois.edu/"
    method: web_scrape
    notes: "Power electronics and energy systems at Illinois."

