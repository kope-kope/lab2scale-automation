# -----------------------------------------------------------------------------
# 8. ADDITIONAL / META SOURCES
# -----------------------------------------------------------------------------
meta:

  - name: "Google Scholar Alerts"
    url: "https://scholar.google.com/scholar_alerts"
    method: api
    notes: >
      Set up alerts for key queries:
      - "GaN power converter"
      - "SiC MOSFET"
      - "wide bandgap power electronics"
      - "silicon carbide inverter"
      - "gallium nitride power"
      Delivers email digests of new papers. No direct API; parse email or use scholar scraping.

  - name: "Semantic Scholar API"
    url: "https://api.semanticscholar.org/"
    method: api
    notes: >
      Free API. Search for papers by keyword with relevance ranking.
      Endpoint: GET /graph/v1/paper/search?query=wide+bandgap+power+electronics
      Rate limit: 100 requests/5 min (unauthenticated).

  - name: "OSTI.gov API"
    url: "https://www.osti.gov/api/v1/records"
    method: api
    notes: >
      DOE Office of Scientific and Technical Information.
      Free API for searching DOE-funded research.
      Example: /api/v1/records?search_field=power+electronics&sort=publication_date+desc
