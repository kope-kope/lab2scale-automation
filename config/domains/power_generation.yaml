# -----------------------------------------------------------------------------
# 7. PATENT DATABASES
# -----------------------------------------------------------------------------
patents:

  - name: "Google Patents - Advanced Search"
    url: "https://patents.google.com/advanced"
    method: scrape
    focus: [all power generation patents]
    notes: >
      Search by CPC classification. Key classifications:
      - Y02E 10/  : Renewable energy (solar, wind, geothermal)
      - Y02E 30/  : Energy generation of nuclear origin (fission + fusion)
      - H02S      : PV power generation
      - H02N      : Electric machines not otherwise provided for (thermoelectric)
      - G21B      : Fusion reactors
      - G21C      : Nuclear reactors (fission)
      - F24S      : Solar heat collectors
      Example URL: https://patents.google.com/?q=fusion+reactor&after=priority:20250101&oq=fusion+reactor

  - name: "USPTO Full-Text Patent Database"
    url: "https://ppubs.uspto.gov/pubwebapp/"
    method: scrape
    focus: [US patents, power generation]
    notes: "Patent Public Search (PPUBS). Search by CPC classification codes."

  - name: "USPTO CPC Classification - Y02E (Energy GHG Reduction)"
    url: "https://www.uspto.gov/web/patents/classification/cpc/html/cpc-Y02E.html"
    reference_pdf: "https://www.uspto.gov/web/patents/classification/cpc/pdf/cpc-scheme-Y02E.pdf"
    method: reference
    focus: [energy generation, transmission, distribution patents]
    notes: >
      Key sub-classifications for power generation:
      Y02E 10/   - Energy generation through renewable energy sources
      Y02E 10/40 - Solar thermal energy (includes solar towers, CSP)
      Y02E 10/50 - Photovoltaic energy (PV)
      Y02E 20/   - Combustion technologies with mitigation potential
      Y02E 30/   - Energy generation of nuclear origin
      Y02E 30/10 - Nuclear fusion reactors
      Y02E 30/30 - Nuclear fission reactors
      Y02E 40/   - Technologies for an efficient electrical power generation, transmission or distribution

  - name: "USPTO CPC - H02S (Photovoltaic Power Generation)"
    url: "https://www.uspto.gov/web/patents/classification/cpc/html/cpc-H02S.html"
    method: reference
    focus: [solar cell patents, PV systems]

  - name: "USPTO CPC - G21B (Fusion Reactors)"
    url: "https://www.uspto.gov/web/patents/classification/cpc/html/cpc-G21B.html"
    method: reference
    focus: [fusion reactor patents, plasma confinement]

  - name: "PatentsView API (USPTO)"
    url: "https://patentsview.org/apis/api-endpoints/cpc"
    method: api
    focus: [patent analytics, trends, assignee tracking]
    notes: >
      REST API for patent data. Filter by CPC codes.
      Migrating to data.uspto.gov (Open Data Portal) by 2026.
      Example: query patents in G21B (fusion) or Y02E 10/50 (PV).

  - name: "Google Patents API (via SerpAPI or SearchAPI)"
    url: "https://www.searchapi.io/docs/google-patents"
    method: api
    focus: [patent search automation]
    notes: "Third-party API wrappers for Google Patents. Paid services."

  - name: "Espacenet (EPO Patent Search)"
    url: "https://worldwide.espacenet.com/"
    method: scrape
    focus: [international patents, CPC search]
    notes: "European Patent Office. Good for international patent landscape. Same CPC codes apply."
