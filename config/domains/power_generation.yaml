# -----------------------------------------------------------------------------
# 3. arXiv CATEGORIES
# -----------------------------------------------------------------------------
# RSS feed format: https://rss.arxiv.org/rss/{category}
# Combine with +: https://rss.arxiv.org/rss/cat1+cat2
# Docs: https://info.arxiv.org/help/rss.html
arxiv:

  - name: "Plasma Physics"
    category: "physics.plasm-ph"
    rss_url: "https://rss.arxiv.org/rss/physics.plasm-ph"
    method: rss
    focus: [fusion, plasma confinement, MHD]
    notes: "Covers magnetically confined plasmas, ICF, laser-plasma interactions."

  - name: "Applied Physics"
    category: "physics.app-ph"
    rss_url: "https://rss.arxiv.org/rss/physics.app-ph"
    method: rss
    focus: [photovoltaics, thermoelectrics, energy devices]
    notes: "Covers energy sciences, photonics, advanced materials for devices."

  - name: "Materials Science (Condensed Matter)"
    category: "cond-mat.mtrl-sci"
    rss_url: "https://rss.arxiv.org/rss/cond-mat.mtrl-sci"
    method: rss
    focus: [solar cell materials, thermoelectric materials, superconductors]

  - name: "Nuclear Experiment"
    category: "nucl-ex"
    rss_url: "https://rss.arxiv.org/rss/nucl-ex"
    method: rss
    focus: [nuclear reactions, fission/fusion experiments]

  - name: "Nuclear Theory"
    category: "nucl-th"
    rss_url: "https://rss.arxiv.org/rss/nucl-th"
    method: rss
    focus: [nuclear structure, fusion cross-sections]

  - name: "Instrumentation and Detectors"
    category: "physics.ins-det"
    rss_url: "https://rss.arxiv.org/rss/physics.ins-det"
    method: rss
    focus: [diagnostic instruments for plasma/fusion/energy]

  - name: "Combined Feed (Plasma + Applied + Materials)"
    rss_url: "https://rss.arxiv.org/rss/physics.plasm-ph+physics.app-ph+cond-mat.mtrl-sci"
    method: rss
    focus: [all power generation research]
    notes: "Composite feed. arXiv supports combining categories with +."

  # --- arXiv API (alternative to RSS for programmatic access) ---
  - name: "arXiv API"
    url: "http://export.arxiv.org/api/query"
    method: api
    notes: >
      REST API. Example query for fusion energy papers:
      http://export.arxiv.org/api/query?search_query=all:fusion+energy+AND+cat:physics.plasm-ph&max_results=50
      Docs: https://info.arxiv.org/help/api/index.html

