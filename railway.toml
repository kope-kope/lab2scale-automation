# Railway service configuration.
#
# Auto-deploy on push to main is enabled in the Railway dashboard when you
# connect this GitHub repo — no extra config needed here.
#
# This file describes the build (Dockerfile) + the default cron service:
#   - Weekly, runs `python main.py full` (sweep + report in one shot)
#   - Schedule: Monday 14:00 UTC = 9:00am ET (Lab2Scale's report time)
#
# For 3x-daily sweeps with a separate weekly report (the spec's intended
# production cadence), see README §Deployment — that path requires
# Postgres + a second cron service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python main.py full"
cronSchedule = "0 14 * * 1"           # Monday 14:00 UTC (9am ET)
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
