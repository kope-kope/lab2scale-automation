# Railway service configuration.
#
# Auto-deploy on push to main is enabled in the Railway dashboard when you
# connect this GitHub repo — no extra config needed here.
#
# This file describes the build (Dockerfile) + the default cron service:
#   - Weekly, runs `python main.py full` (sweep + report in one shot)
#   - Schedule: Monday 16:00 UTC = 9:00am PT (Pacific Daylight Time)
#
# Cron is fixed-UTC and can't follow DST: 16:00 UTC is 9am PDT (summer) but
# 8am PST (winter). To keep it at 9am through winter, switch to `0 17 * * 1`.
# For daily cadence instead, use `0 16 * * *` (and set RESEARCH_WINDOW_DAYS=1).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python main.py full"
cronSchedule = "0 16 * * 1"           # Monday 16:00 UTC (9am PT / PDT)
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
